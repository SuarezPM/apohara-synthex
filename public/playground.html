<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Synthex — Playground (try it yourself)</title>
<style>
  :root {
    --bg: #0b0d12;
    --bg-card: #131722;
    --bg-input: #1f2937;
    --ink: #e2e8f0;
    --muted: #94a3b8;
    --brand: #8b5cf6;
    --brand-d: #7c3aed;
    --ok: #10b981;
    --warn: #f59e0b;
    --crit: #ef4444;
    --line: #1f2937;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font: 14px/1.5 ui-monospace, "SF Mono", Menlo, monospace; background: var(--bg); color: var(--ink); padding: 24px; max-width: 1100px; margin: 0 auto; }
  header { margin-bottom: 24px; }
  h1 { font-size: 22px; color: var(--brand); margin-bottom: 6px; }
  .sub { color: var(--muted); font-size: 12px; }
  .sub a { color: var(--ink); text-decoration: underline dotted; }
  .card { background: var(--bg-card); border: 1px solid var(--line); border-radius: 8px; padding: 18px; margin-bottom: 16px; }
  label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 6px; }
  input[type="text"], select { width: 100%; background: var(--bg-input); color: var(--ink); border: 1px solid var(--line); border-radius: 6px; padding: 10px 12px; font: inherit; }
  input[type="text"]:focus, select:focus { outline: 2px solid var(--brand); border-color: var(--brand); }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  button { background: var(--brand); color: white; border: none; border-radius: 6px; padding: 12px 18px; font: inherit; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  button:hover { background: var(--brand-d); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.secondary { background: var(--bg-input); border: 1px solid var(--line); color: var(--ink); }
  button.secondary:hover { background: var(--line); }
  button.example { font-size: 11px; padding: 6px 10px; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .actions { display: flex; gap: 10px; margin-top: 14px; align-items: center; flex-wrap: wrap; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
  .badge.ok { background: rgba(16, 185, 129, 0.15); color: var(--ok); }
  .badge.warn { background: rgba(245, 158, 11, 0.15); color: var(--warn); }
  .badge.crit { background: rgba(239, 68, 68, 0.15); color: var(--crit); }
  .badge.muted { background: rgba(148, 163, 184, 0.15); color: var(--muted); }
  pre { background: #050609; color: #cbd5e1; padding: 14px; border-radius: 6px; font-size: 12px; overflow-x: auto; max-height: 400px; overflow-y: auto; }
  .verdict-row { display: flex; gap: 18px; margin-top: 12px; flex-wrap: wrap; }
  .verdict-row > div { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .meta { font-size: 11px; color: var(--muted); }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--muted); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .footer { margin-top: 32px; color: var(--muted); font-size: 11px; text-align: center; }
  .footer a { color: var(--muted); }
</style>
</head>
<body>

<header>
  <h1>SYNTHEX — Playground</h1>
  <p class="sub">Try it yourself. URL → scraped → classified → cryptographically sealed. <a href="/">← back to landing</a> · <a href="/dashboard.html">live dashboard</a></p>
</header>

<div class="card">
  <label>URL or search query</label>
  <input type="text" id="target" placeholder="https://stripe.com/pricing" value="https://stripe.com/pricing" />

  <div class="grid-2" style="margin-top: 12px;">
    <div>
      <label>Lens</label>
      <select id="lens">
        <option value="all">All 4 lenses (default)</option>
        <option value="gtm">GTM</option>
        <option value="finance">Finance</option>
        <option value="security">Security</option>
        <option value="supply-chain">Supply-chain</option>
      </select>
    </div>
    <div>
      <label>Model tier</label>
      <select id="tier">
        <option value="">Default (OSS — DeepSeek)</option>
        <option value="oss">OSS — DeepSeek non-thinking (recommended)</option>
        <option value="paid">PAID — DeepSeek thinking (premium)</option>
        <option value="free">FREE — Nemotron Nano 9B (low quality, see docs)</option>
      </select>
    </div>
  </div>

  <label style="margin-top: 14px;">Pre-loaded examples</label>
  <div class="grid-3">
    <button class="example" data-url="https://stripe.com/pricing" data-lens="gtm">stripe.com/pricing · GTM</button>
    <button class="example" data-url="https://www.cisa.gov/known-exploited-vulnerabilities-catalog" data-lens="security">CISA KEV · Security</button>
    <button class="example" data-url="https://www.federalreserve.gov/newsevents/pressreleases.htm" data-lens="finance">Fed releases · Finance</button>
    <button class="example" data-url="https://github.com/anthropics/claude-code/releases" data-lens="gtm">claude-code releases · GTM</button>
    <button class="example" data-url="https://nvd.nist.gov/vuln/full-listing" data-lens="security">NVD CVEs · Security</button>
  </div>

  <div class="actions">
    <button id="analyze">Analyze & seal</button>
    <button class="secondary" id="watch">Watch (60s loop)</button>
    <span id="busy" style="display:none;"><span class="spinner"></span> running pipeline...</span>
    <span id="elapsed" class="meta"></span>
  </div>
</div>

<div class="card" id="result-card" style="display: none;">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
    <strong>Result</strong>
    <div>
      <span class="badge" id="mode-badge">—</span>
      <span class="badge muted" id="tier-badge">tier: default</span>
    </div>
  </div>

  <div class="verdict-row" id="verdict-row"></div>

  <label style="margin-top: 16px;">Evidence (JSON)</label>
  <pre id="output">—</pre>

  <div class="actions">
    <button class="secondary" id="download">Download JSON</button>
    <button class="secondary" id="copy-hash">Copy contentHash</button>
    <a id="verify-link" class="meta" style="margin-left: auto;">verify offline: <code>node bin/decode-evidence.js</code></a>
  </div>
</div>

<div class="footer">
  Synthex v0.6.0 "Watch &amp; Prove" · MIT · <a href="https://github.com/SuarezPM/apohara-synthex">github</a> · <a href="https://www.npmjs.com/package/@apohara/synthex">npm</a>
</div>

<script>
const $ = (id) => document.getElementById(id);
let lastEvidence = null;
let watchTimer = null;

function setBadge(el, txt, kind) {
  el.textContent = txt;
  el.className = "badge " + (kind || "muted");
}

function renderVerify(verify, mode) {
  const row = $("verdict-row");
  const badge = (label, ok) => {
    const color = ok === true ? "ok" : ok === false ? "crit" : "muted";
    const sym = ok === true ? "✓" : ok === false ? "✗" : "—";
    return `<div><span class="badge ${color}">${sym} ${label}</span></div>`;
  };
  row.innerHTML = [
    badge("hash", verify?.hashOk),
    badge("HMAC", verify?.hmacOk),
    badge("RFC 3161 TSA", verify?.tsaOk),
  ].join("");
}

async function analyze() {
  const target = $("target").value.trim();
  const lens = $("lens").value;
  const tier = $("tier").value;
  if (!target) { alert("Enter a URL or term"); return; }

  $("analyze").disabled = true;
  $("busy").style.display = "inline-block";
  const t0 = performance.now();
  const elapsedTimer = setInterval(() => { $("elapsed").textContent = ((performance.now() - t0) / 1000).toFixed(1) + "s"; }, 100);

  try {
    const resp = await fetch("/api/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ target, lens, tier: tier || undefined }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);

    lastEvidence = data.evidence;
    $("result-card").style.display = "block";
    setBadge($("mode-badge"), "mode: " + data.mode, data.mode === "live" ? "ok" : "warn");
    setBadge($("tier-badge"), "tier: " + data.tier, data.tier === "free" ? "warn" : "muted");
    renderVerify(data.verify, data.mode);
    $("output").textContent = JSON.stringify(data.evidence, null, 2);
  } catch (e) {
    $("result-card").style.display = "block";
    $("output").textContent = "ERROR: " + e.message;
    $("verdict-row").innerHTML = `<div><span class="badge crit">✗ failed</span></div>`;
  } finally {
    clearInterval(elapsedTimer);
    $("analyze").disabled = false;
    $("busy").style.display = "none";
  }
}

async function watchOnce() {
  if (watchTimer) { clearInterval(watchTimer); watchTimer = null; $("watch").textContent = "Watch (60s loop)"; return; }
  $("watch").textContent = "Stop watch";
  let count = 0;
  const tick = async () => {
    count++;
    await analyze();
    if (count >= 6) { // 6 ticks × 10s = 60s
      clearInterval(watchTimer);
      watchTimer = null;
      $("watch").textContent = "Watch (60s loop)";
    }
  };
  tick();
  watchTimer = setInterval(tick, 10000);
}

document.querySelectorAll("button.example").forEach((b) => {
  b.addEventListener("click", () => {
    $("target").value = b.dataset.url;
    $("lens").value = b.dataset.lens;
  });
});

$("analyze").addEventListener("click", analyze);
$("watch").addEventListener("click", watchOnce);
$("download").addEventListener("click", () => {
  if (!lastEvidence) return;
  const blob = new Blob([JSON.stringify(lastEvidence, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `synthex-evidence-${lastEvidence.contentHash?.slice(0, 12) || Date.now()}.json`;
  a.click();
});
$("copy-hash").addEventListener("click", () => {
  if (lastEvidence?.contentHash) {
    navigator.clipboard.writeText(lastEvidence.contentHash);
    $("copy-hash").textContent = "copied!";
    setTimeout(() => { $("copy-hash").textContent = "Copy contentHash"; }, 1500);
  }
});
</script>

</body>
</html>
